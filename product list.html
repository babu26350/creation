<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Details</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.card{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
text-align:center;
}

img{
width:100%;
border-radius:10px;
}

button{
width:100%;
padding:15px;
background:green;
color:white;
border:none;
border-radius:8px;
font-size:18px;
margin-top:15px;
cursor:pointer;
}

.price{
font-size:28px;
font-weight:bold;
color:green;
margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

<img src="https://picsum.photos/400/300" alt="Product">

<h2>Product Name</h2>

<div class="price">₹150</div>

<button onclick="buyNow()">
Buy Now
</button>

</div>

<script>

const productPrice = 150;

function buyNow(){

window.location.href =
`pay.html?amount=${productPrice}`;

}

</script>

</body>
</html>
