 <!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purnima E‑Mitra JSON Manager</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#f4f6f9}
.sidebar{position:fixed;left:0;top:0;width:240px;height:100vh;background:#0f172a;color:#fff;padding:20px}
.sidebar h2{margin-top:0}
.main{margin-left:240px;padding:20px}
.card{background:#fff;border-radius:12px;padding:15px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
textarea,input{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px}
textarea{height:220px}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer;margin:4px}
.primary{background:#2563eb;color:#fff}
.danger{background:#dc2626;color:#fff}
.success{background:#16a34a;color:#fff}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px}
th{background:#2563eb;color:#fff}
.progress{height:18px;background:#ddd;border-radius:20px;overflow:hidden}
.bar{height:100%;width:0;background:#16a34a}
@media(max-width:768px){.sidebar{position:relative;width:100%;height:auto}.main{margin-left:0}}
</style>
</head>
<body>
<div class="sidebar">
<h2>Purnima E‑Mitra</h2>
<p>JSON News & Scheme Manager</p>
</div>

<div class="main">
<div class="card">
<h2>Bulk JSON Upload Tool</h2>
<input id="api" value="https://6a2963d4f59cb8f65f1d0c82.mockapi.io/update">
<br><br>
<textarea id="jsonInput" placeholder='[{"title":"PM Kisan","detail":"Yojana"}]'></textarea>
<br>
<button class="primary" onclick="previewJSON()">Preview</button>
<button class="success" onclick="uploadJSON()">Upload All</button>
<button class="primary" onclick="fetchRecords()">Fetch Records</button>
<button class="danger" onclick="deleteAll()">Delete All</button>
<button class="primary" onclick="exportJSON()">Export JSON</button>
</div>

<div class="card">
<h3>Progress</h3>
<div class="progress"><div id="bar" class="bar"></div></div>
<p id="status">Ready</p>
</div>

<div class="card">
<input id="search" placeholder="Search..." onkeyup="searchTable()">
</div>

<div class="card">
<h3>Preview / Records</h3>
<table>
<thead><tr><th>ID</th><th>Title</th><th>Detail</th><th>Action</th></tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

<script>
function api(){return document.getElementById('api').value}

function previewJSON(){
 try{
  const data=JSON.parse(jsonInput.value);
  render(data);
  status.innerText="JSON Valid";
 }catch(e){alert("Invalid JSON")}
}

function render(data){
 tbody.innerHTML=data.map(x=>`
 <tr>
 <td>${x.id||''}</td>
 <td>${x.title||''}</td>
 <td>${x.detail||''}</td>
 <td>-</td>
 </tr>`).join('');
}

async function uploadJSON(){
 const arr=JSON.parse(jsonInput.value);
 let done=0;
 for(const item of arr){
   await fetch(api(),{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(item)
   });
   done++;
   bar.style.width=((done/arr.length)*100)+'%';
   status.innerText=`${done}/${arr.length} Uploaded`;
 }
 fetchRecords();
}

async function fetchRecords(){
 const res=await fetch(api());
 const data=await res.json();
 tbody.innerHTML=data.map(x=>`
 <tr>
 <td>${x.id}</td>
 <td>${x.title}</td>
 <td>${x.detail}</td>
 <td><button class="danger" onclick="deleteOne('${x.id}')">Delete</button></td>
 </tr>`).join('');
}

async function deleteOne(id){
 await fetch(api()+"/"+id,{method:'DELETE'});
 fetchRecords();
}

async function deleteAll(){
 if(!confirm('Delete all records?')) return;
 const res=await fetch(api());
 const data=await res.json();
 for(const item of data){
   await fetch(api()+"/"+item.id,{method:'DELETE'});
 }
 fetchRecords();
}

function exportJSON(){
 const rows=[...tbody.querySelectorAll('tr')].map(r=>({
  id:r.cells[0].innerText,
  title:r.cells[1].innerText,
  detail:r.cells[2].innerText
 }));
 const blob=new Blob([JSON.stringify(rows,null,2)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='schemes.json';
 a.click();
}

function searchTable(){
 const v=search.value.toLowerCase();
 document.querySelectorAll('#tbody tr').forEach(r=>{
  r.style.display=r.innerText.toLowerCase().includes(v)?'':'none';
 });
}
fetchRecords();
</script>
</body>
  </html>
