<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Units Master</title>

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f4f4;
}

nav{
background:#1565c0;
padding:12px;
}

nav a{
color:white;
text-decoration:none;
margin-right:15px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

input{
width:100%;
padding:10px;
margin:10px 0;
box-sizing:border-box;
}

button{
padding:10px 15px;
border:none;
cursor:pointer;
border-radius:4px;
margin-right:5px;
}

.saveBtn{
background:#1565c0;
color:white;
}

.editBtn{
background:orange;
color:white;
}

.deleteBtn{
background:red;
color:white;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#1565c0;
color:white;
}

</style>

</head>
<body>

<nav>

<a href="groups.html">Groups</a>
<a href="ledger.html">Ledgers</a>
<a href="units.html">Units</a>
<a href="stock-groups.html">Stock Groups</a>
<a href="stock-items.html">Stock Items</a>

</nav>

<div class="container">

<div class="card">

<h2>Units Master</h2>

<input
type="text"
id="unitName"
placeholder="Unit Name">

<button
class="saveBtn"
onclick="saveUnit()">
Save Unit
</button>

</div>

<div class="card">

<h2>Units List</h2>

<table>

<thead>
<tr>
<th>Unit Name</th>
<th>Action</th>
</tr>
</thead>

<tbody id="unitTable">
</tbody>

</table>

</div>

</div>

<script>

let units =
JSON.parse(
localStorage.getItem("units")
) || [];

if(units.length===0){

units=[

{id:1,name:"Nos"},
{id:2,name:"Box"},
{id:3,name:"Kg"},
{id:4,name:"Gram"},
{id:5,name:"Ltr"},
{id:6,name:"ML"},
{id:7,name:"Meter"},
{id:8,name:"Feet"},
{id:9,name:"Inch"},
{id:10,name:"Piece"},
{id:11,name:"Packet"},
{id:12,name:"Dozen"},
{id:13,name:"Bag"},
{id:14,name:"Bottle"},
{id:15,name:"Bundle"},
{id:16,name:"Carton"},
{id:17,name:"Pair"},
{id:18,name:"Set"},
{id:19,name:"Roll"},
{id:20,name:"Ton"}

];

localStorage.setItem(
"units",
JSON.stringify(units)
);

}

let editId=null;

function saveUnit(){

let name=
document.getElementById(
"unitName"
).value.trim();

if(!name){

alert("Enter Unit Name");
return;

}

let duplicate=
units.find(
u=>
u.name.toLowerCase()===
name.toLowerCase()
&&
u.id!==editId
);

if(duplicate){

alert("Unit Already Exists");
return;

}

if(editId){

let index=
units.findIndex(
u=>u.id===editId
);

units[index].name=name;

editId=null;

}else{

units.push({

id:Date.now(),

name:name

});

}

localStorage.setItem(
"units",
JSON.stringify(units)
);

document.getElementById(
"unitName"
).value='';

renderUnits();

}

function editUnit(id){

let unit=
units.find(
u=>u.id===id
);

if(!unit) return;

editId=id;

document.getElementById(
"unitName"
).value=
unit.name;

window.scrollTo({
top:0,
behavior:"smooth"
});

}

function deleteUnit(id){

if(!confirm(
"Delete Unit ?"
))
return;

units=
units.filter(
u=>u.id!==id
);

localStorage.setItem(
"units",
JSON.stringify(units)
);

renderUnits();

}

function renderUnits(){

let html='';

units.forEach(u=>{

html+=`

<tr>

<td>${u.name}</td>

<td>

<button
class="editBtn"
onclick="editUnit(${u.id})">
Edit
</button>

<button
class="deleteBtn"
onclick="deleteUnit(${u.id})">
Delete
</button>

</td>

</tr>

`;

});

document.getElementById(
"unitTable"
).innerHTML=html;

}

renderUnits();

</script>

</body>
</html>
