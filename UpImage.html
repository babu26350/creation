<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Upload System</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#111827
);

padding:20px;

}

.upload-container{

width:100%;
max-width:500px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);
border-radius:30px;
padding:30px;
box-shadow:
0 10px 40px rgba(0,0,0,0.3);

}

.title{

font-size:30px;
font-weight:700;
color:white;
text-align:center;
margin-bottom:10px;

}

.subtitle{

text-align:center;
color:#cbd5e1;
font-size:14px;
margin-bottom:30px;

}

.upload-box{

border:2px dashed rgba(255,255,255,0.2);
border-radius:25px;
padding:40px 20px;
text-align:center;
cursor:pointer;
transition:0.3s;
background:rgba(255,255,255,0.04);

}

.upload-box:hover{

transform:translateY(-3px);
border-color:#38bdf8;
background:rgba(255,255,255,0.08);

}

.upload-icon{

font-size:60px;
margin-bottom:15px;

}

.upload-text{

font-size:18px;
color:white;
font-weight:600;

}

.upload-sub{

margin-top:8px;
font-size:13px;
color:#cbd5e1;

}

#imageInput{

display:none;

}

.preview-section{

margin-top:30px;
display:none;

}

.preview-title{

color:white;
font-size:18px;
margin-bottom:15px;

}

#previewImage{

width:100%;
border-radius:20px;
max-height:350px;
object-fit:cover;
border:2px solid rgba(255,255,255,0.1);

}

.loading{

margin-top:20px;
text-align:center;
color:#38bdf8;
display:none;

}

.link-box{

margin-top:25px;

}

.link-label{

color:white;
margin-bottom:10px;
font-size:15px;

}

#imageLink{

width:100%;
padding:16px;
border:none;
outline:none;
border-radius:15px;
font-size:15px;
background:white;
color:#111827;

}

.copy-btn{

margin-top:15px;
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:linear-gradient(
135deg,
#0ea5e9,
#2563eb
);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;

}

.copy-btn:hover{

transform:translateY(-2px);

}

.success{

margin-top:18px;
padding:14px;
background:rgba(16,185,129,0.15);
border:1px solid rgba(16,185,129,0.3);
color:#6ee7b7;
border-radius:14px;
text-align:center;
display:none;

}

@media(max-width:600px){

.upload-container{

padding:20px;

}

.title{

font-size:24px;

}

.upload-box{

padding:30px 15px;

}

}

</style>
</head>
<body>

<div class="upload-container">

<h1 class="title">
Image Upload
</h1>

<p class="subtitle">
Upload Image & Get Instant Direct Link
</p>

<label class="upload-box" for="imageInput">

<div class="upload-icon">
📤
</div>

<div class="upload-text">
Choose Image
</div>

<div class="upload-sub">
PNG, JPG, GIF Supported
</div>

</label>

<input type="file"
id="imageInput"
accept="image/*">

<div class="preview-section"
id="previewSection">

<div class="preview-title">
Preview
</div>

<img id="previewImage">

<div class="loading"
id="loadingText">

Uploading Image...

</div>

<div class="link-box">

<div class="link-label">
Direct Image Link
</div>

<input
type="text"
id="imageLink"
readonly
placeholder="Image Link Appears Here">

<button
class="copy-btn"
onclick="copyLink()">

Copy Link

</button>

<div class="success"
id="successBox">

Image Uploaded Successfully

</div>

</div>

</div>

</div>

<script>

/* =========================
   IMGBB API KEY
========================= */

const API_KEY =
"7c2a5db7823d49247a1dd5de2112a2b0";



/* =========================
   ELEMENTS
========================= */

const imageInput =
document.getElementById("imageInput");

const previewImage =
document.getElementById("previewImage");

const previewSection =
document.getElementById("previewSection");

const imageLink =
document.getElementById("imageLink");

const loadingText =
document.getElementById("loadingText");

const successBox =
document.getElementById("successBox");



/* =========================
   IMAGE SELECT
========================= */

imageInput.addEventListener(
"change",
async function(){

const file = this.files[0];

if(!file){

return;

}

/* PREVIEW SHOW */

previewSection.style.display =
"block";

previewImage.src =
URL.createObjectURL(file);

/* LOADING */

loadingText.style.display =
"block";

successBox.style.display =
"none";

/* FORM DATA */

const formData = new FormData();

formData.append(
"image",
file
);



try{

/* API CALL */

const response = await fetch(

"https://api.imgbb.com/1/upload?key=" + API_KEY,

{
method:"POST",
body:formData
}

);

const data =
await response.json();

console.log(data);

/* DIRECT LINK */

const directLink =
data.data.url;

/* SHOW LINK */

imageLink.value =
directLink;

/* SUCCESS */

loadingText.style.display =
"none";

successBox.style.display =
"block";

/* AUTO COPY */

navigator.clipboard.writeText(
directLink
);

}catch(error){

console.log(error);

loadingText.innerHTML =
"Upload Failed";

}

});



/* =========================
   COPY LINK
========================= */

function copyLink(){

if(!imageLink.value){

alert("No Link Found");

return;

}

navigator.clipboard.writeText(
imageLink.value
);

alert("Link Copied");

}

</script>

</body>
</html>
