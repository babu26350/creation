<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Self-Practice Test</title>
    <style>
        /* सुंदर लुक के लिए CSS */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .quiz-card {
            background: white;
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .question-box {
            margin-bottom: 25px;
            padding: 15px;
            border-left: 5px solid #3498db;
            background: #f9f9f9;
        }
        .options-list {
            list-style: none;
            padding: 0;
        }
        .options-list li {
            background: #fff;
            border: 1px solid #ddd;
            margin: 8px 0;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }
        .options-list li:hover {
            background: #e1f5fe;
            border-color: #3498db;
        }
        #loading {
            text-align: center;
            font-weight: bold;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="quiz-card">
        <h1>आज का प्रैक्टिस टेस्ट</h1>
        <div id="loading">प्रश्नों को लोड किया जा रहा है...</div>
        <div id="quiz-container">
            <!-- यहाँ script.js के ज़रिए प्रश्न दिखेंगे -->
        </div>
    </div>

    <!-- आपकी API कॉल वाली JS फाइल -->
    <script src="script.js"></script>
</body>
</html>
