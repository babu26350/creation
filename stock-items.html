<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Purchase Voucher</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

nav{
background:#1565c0;
padding:12px;
}

nav a{
color:white;
text-decoration:none;
margin-right:15px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h2{
margin-top:0;
}

input,
select,
textarea{
width:100%;
padding:10px;
margin:8px 0;
box-sizing:border-box;
}

button{
background:#1565c0;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:4px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

th{
background:#1565c0;
color:white;
}

</style>
</head>
<body>

<nav>

<a href="groups.html">Groups</a>
<a href="ledger.html">Ledgers</a>
<a href="stock-items.html">Stock Items</a>
<a href="purchase-voucher.html">Purchase</a>
<a href="voucher.html">Voucher</a>

</nav>

<div class="container">

<div class="card">

<h2>Purchase Voucher</h2>

<label>Voucher No</label>
<input type="text" id="voucherNo" readonly>

<label>Date</label>
<input type="date" id="voucherDate">

<label>Supplier Ledger</label>
<select id="partyLedger"></select>

<label>Purchase Ledger</label>
<select id="purchaseLedger"></select>

<label>Stock Item</label>
<select id="itemName"></select>

<label>Quantity</label>
<input type="number" id="qty" value="1">

<label>Rate</label>
<input type="number" id="rate">

<label>Amount</label>
<input type="number" id="amount" readonly>

<label>Narration</label>
<textarea id="narration"></textarea>

<button onclick="savePurchase()">
Save Purchase
</button>

</div>

<div class="card">

<h2>Purchase Voucher List</h2>

<table>

<thead>

<tr>
<th>V.No</th>
<th>Date</th>
<th>Party</th>
<th>Item</th>
<th>Qty</th>
<th>Rate</th>
<th>Amount</th>
</tr>

</thead>

<tbody id="purchaseTable">
</tbody>

</table>

</div>

</div>

<script>

document.getElementById("voucherDate").value =
new Date().toISOString().split('T')[0];

let ledgers =
JSON.parse(
localStorage.getItem("ledgers")
) || [];

let stockItems =
JSON.parse(
localStorage.getItem("stockItems")
) || [];

let purchaseVouchers =
JSON.parse(
localStorage.getItem("purchaseVouchers")
) || [];

function generateVoucherNo(){

document.getElementById(
"voucherNo"
).value =
"PUR-" + (purchaseVouchers.length + 1);

}

function loadSupplierLedgers(){

let html='';

ledgers.forEach(l=>{

if(
l.group==="Sundry Creditors" ||
l.group==="Current Liabilities"
){

html += `
<option value="${l.name}">
${l.name}
</option>
`;

}

});

document.getElementById(
"partyLedger"
).innerHTML = html;

}

function loadPurchaseLedgers(){

let html='';

ledgers.forEach(l=>{

if(
l.group==="Purchase Accounts"
){

html += `
<option value="${l.name}">
${l.name}
</option>
`;

}

});

document.getElementById(
"purchaseLedger"
).innerHTML = html;

}

function loadItems(){

let html='';

stockItems.forEach(i=>{

html += `
<option value="${i.name}">
${i.name}
</option>
`;

});

document.getElementById(
"itemName"
).innerHTML = html;

}

function calculateAmount(){

let qty =
Number(
document.getElementById(
"qty"
).value
);

let rate =
Number(
document.getElementById(
"rate"
).value
);

document.getElementById(
"amount"
).value =
qty * rate;

}

document
.getElementById("qty")
.addEventListener(
"input",
calculateAmount
);

document
.getElementById("rate")
.addEventListener(
"input",
calculateAmount
);

function savePurchase(){

let voucher={

id:Date.now(),

voucherNo:
document.getElementById(
"voucherNo"
).value,

date:
document.getElementById(
"voucherDate"
).value,

party:
document.getElementById(
"partyLedger"
).value,

purchaseLedger:
document.getElementById(
"purchaseLedger"
).value,

item:
document.getElementById(
"itemName"
).value,

qty:Number(
document.getElementById(
"qty"
).value
),

rate:Number(
document.getElementById(
"rate"
).value
),

amount:Number(
document.getElementById(
"amount"
).value
),

narration:
document.getElementById(
"narration"
).value

};

if(voucher.amount<=0){

alert("Enter Valid Amount");

return;

}

/* Purchase Voucher Save */

purchaseVouchers.push(
voucher
);

localStorage.setItem(
"purchaseVouchers",
JSON.stringify(
purchaseVouchers
)
);

/* Stock Transaction */

let stockTransactions =
JSON.parse(
localStorage.getItem(
"stockTransactions"
)
) || [];

stockTransactions.push({

id:Date.now(),

date:voucher.date,

item:voucher.item,

qty:voucher.qty,

type:"Purchase"

});

localStorage.setItem(
"stockTransactions",

JSON.stringify(
stockTransactions
)

);

/* Accounting Voucher */

let vouchers =
JSON.parse(
localStorage.getItem(
"vouchers"
)
) || [];

vouchers.push({

id:Date.now(),

date:voucher.date,

type:"Purchase",

debitLedger:
voucher.purchaseLedger,

creditLedger:
voucher.party,

amount:
voucher.amount,

narration:
voucher.narration

});

localStorage.setItem(
"vouchers",

JSON.stringify(
vouchers
)

);

alert(
"Purchase Voucher Saved"
);

location.reload();

}

function renderPurchases(){

let html='';

purchaseVouchers.forEach(v=>{

html += `

<tr>

<td>${v.voucherNo}</td>

<td>${v.date}</td>

<td>${v.party}</td>

<td>${v.item}</td>

<td>${v.qty}</td>

<td>${v.rate}</td>

<td>${v.amount}</td>

</tr>

`;

});

document.getElementById(
"purchaseTable"
).innerHTML = html;

}

generateVoucherNo();
loadSupplierLedgers();
loadPurchaseLedgers();
loadItems();
renderPurchases();

</script>

</body>
</html>
