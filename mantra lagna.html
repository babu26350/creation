 <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>वैदिक मंत्र शोधन - लग्न भाव फल सहित</title>
    <style>
        :root {
            --primary: #d35400;
            --primary-hover: #e67e22;
            --dark-blue: #2c3e50;
            --bg-body: #f4f6f9;
            --bg-card: #fff;
            --shubh-green: #27ae60;
            --shubh-bg: #d4edda;
            --shubh-text: #155724;
            --sadhya-yellow: #f39c12;
            --sadhya-bg: #fff3cd;
            --sadhya-text: #856404;
            --ashubh-red: #c0392b;
            --ashubh-bg: #f8d7da;
            --ashubh-text: #721c24;
            --lagna-bg: #eaf2f8;
            --lagna-text: #1b4f72;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: #333;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 1300px;
            width: 100%;
            margin: 10px auto;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary-hover);
            padding-bottom: 10px;
            font-size: 20px;
        }

        .form-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            max-width: 300px;
        }

        label {
            font-weight: bold;
            color: var(--dark-blue);
            font-size: 15px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 11px;
            border: 2px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            text-align: center;
            box-sizing: border-box;
            background-color: white;
        }

        button {
            background-color: var(--primary);
            color: white;
            padding: 12px 35px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            max-width: 300px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .info-box {
            background-color: #e8f4f8;
            padding: 15px;
            border-left: 5px solid #2980b9;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
            font-size: 15px;
            text-align: center;
            line-height: 1.6;
        }

        .table-container {
            margin-top: 25px;
            overflow-x: auto;
            display: none;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 900px;
        }

        th, td {
            padding: 12px 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: var(--dark-blue);
            color: white;
            font-weight: 600;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .badge-shubh {
            background-color: var(--shubh-bg);
            color: var(--shubh-text);
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
        }

        .badge-sadhya {
            background-color: var(--sadhya-bg);
            color: var(--sadhya-text);
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
        }

        .badge-tyajya {
            background-color: var(--ashubh-bg);
            color: var(--ashubh-text);
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
        }

        .badge-lagna {
            background-color: var(--lagna-bg);
            color: var(--lagna-text);
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
        }

        @media (min-width: 600px) {
            .form-grid {
                flex-direction: row;
                justify-content: center;
                align-items: flex-end;
            }
            h2 { font-size: 24px; }
            table { font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>गृहस्थ साधक मंत्र शोधन एवं लग्न भाव फल सारणी</h2>
    
    <div class="form-grid">
        <div class="form-group">
            <label for="userName">साधक का नाम:</label>
            <input type="text" id="userName" placeholder="नाम हिंदी में लिखें..." required>
        </div>
        
        <div class="form-group">
            <label for="userLagna">साधक लग्न (वैकल्पिक):</label>
            <select id="userLagna">
                <option value="none">-- उपलब्ध नहीं / ज्ञात नहीं --</option>
                <option value="1">मेष</option>
                <option value="2">वृषभ</option>
                <option value="3">मिथुन</option>
                <option value="4">कर्क</option>
                <option value="5">सिंह</option>
                <option value="6">कन्या</option>
                <option value="7">तुला</option>
                <option value="8">वृश्चिक</option>
                <option value="9">धनु</option>
                <option value="10">मकर</option>
                <option value="11">कुंभ</option>
                <option value="12">मीन</option>
            </select>
        </div>
        
        <button onclick="generateCompleteMatrix()">सूक्ष्म शोधन सारणी बनाएं</button>
    </div>
    
    <div id="infoBox" class="info-box"></div>
    
    <div id="tableContainer" class="table-container">
        <table>
            <thead>
                <tr>
                    <th>मंत्र वर्ण</th>
                    <th>मंत्र राशि (स्वामी)</th>
                    <th>राशि मैत्री संबंध</th>
                    <th>सिद्ध-साध्य स्थिति (दूरी)</th>
                    <th>गृहस्थ वरीयता निर्णय</th>
                    <th id="lagnaTh" style="display: none;">लग्न अनुसार विशिष्ट फल</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- डेटा डायनामिकली लोड होगा -->
            </tbody>
        </table>
    </div>
</div>

<script>
const vargaMap = {
    'अ':1,'आ':1,'इ':1,'ई':1,'उ':1,'ऊ':1,'ऋ':1,'ए':1,'ऐ':1,'ओ':1,'औ':1,'अं':1,'अः':1,
    'क':2,'ख':2,'ग':2,'घ':2,'ङ':2,
    'च':3,'छ':3,'ज':3,'झ':3,'ञ':3,
    'ट':4,'ठ':4,'ड':4,'ढ':4,'ण':4,
    'त':5,'थ':5,'द':5,'ध':5,'न':5,
    'प':6,'फ':6,'ब':6,'भ':6,'म':6,
    'य':7,'र':7,'ल':7,'व':7,
    'श':8,'ष':8,'स':8,'ह':8,'क्ष':8
};

const allHindiAlphabets = [
    'अ', 'आ', 'इ', 'ई', 'उ', 'ऊ', 'ए', 'ऐ', 'ओ', 'औ',
    'क', 'ख', 'ग', 'घ', 'च', 'छ', 'ज', 'झ', 'ट', 'ठ', 
    'ड', 'ढ', 'त', 'थ', 'द', 'ध', 'न', 'प', 'फ', 'ब', 
    'भ', 'म', 'य', 'र', 'ल', 'व', 'श', 'ष', 'स', 'ह', 'क्ष'
];

const rashiMatrix = [
    { id: 1, name: "मेष", lord: "मंगल", chars: ['च','चे','चो','ला','ली','लू','ले','लो','अ','आ'] },
    { id: 2, name: "वृषभ", lord: "शुक्र", chars: ['इ','ई','उ','ऊ','ए','ओ','वा','वी','वू','वे','वो'] },
    { id: 3, name: "मिथुन", lord: "बुध", chars: ['का','की','कू','घ','ङ','छ','के','को','हा','क','ख','ग'] },
    { id: 4, name: "कर्क", lord: "चंद्रमा", chars: ['ही','हू','हे','हो','डा','डी','डू','डे','डो','ह'] },
    { id: 5, name: "सिंह", lord: "सूर्य", chars: ['मा','मी','मू','मे','मो','टा','टी','टू','टे','म'] },
    { id: 6, name: "कन्या", lord: "बुध", chars: ['टो','पा','पी','पू','ष','ण','ठ','पे','पो','प','ष'] },
    { id: 7, name: "तुला", lord: "शुक्र", chars: ['रा','री','रू','रे','रो','ता','ती','तू','ते','र','त'] },
    { id: 8, name: "वृश्चिक", lord: "मंगल", chars: ['तो','ना','नी','नू','ने','नो','या','यी','यू','न','बा','बी','बू','ब'] },
    { id: 9, name: "धनु", lord: "बृहस्पति", chars: ['ये','यो','भा','भी','भू','ध','फा','ढा','भे','ध','फ'] },
    { id: 10, name: "मकर", lord: "शनि", chars: ['भो','जा','जी','खी','खू','खे','खो','गा','गी','ज','ख'] },
    { id: 11, name: "कुंभ", lord: "शनि", chars: ['गू','गे','गो','सा','सी','सू','से','सो','दा','स','द'] },
    { id: 12, name: "मीन", lord: "बृहस्पति", chars: ['दी','दू','थ','झ','ञ','दे','दो','चा','ची','थ'] }
];

const friendshipMap = {
    "सूर्य": { "मित्र": ["चंद्रमा", "मंगल", "बृहस्पति"], "शत्रु": ["शुक्र", "शनि"] },
    "चंद्रма": { "मित्र": ["सूर्य", "बुध"], "शत्रु": [] },
    "मंगल": { "मित्र": ["सूर्य", "चंद्रमा", "बृहस्पति"], "शत्रु": ["बुध"] },
    "बुध": { "मित्र": ["सूर्य", "शुक्र"], "शत्रु": ["चंद्रमा"] },
    "बृहस्पति": { "मित्र": ["सूर्य", "चंद्रमा", "मंगल"], "शत्रु": ["बुध", "शुक्र"] },
    "शुक्र": { "मित्र": ["बुध", "शनि"], "शत्रु": ["सूर्य", "चंद्रमा"] },
    "शनि": { "मित्र": ["बुध", "शुक्र"], "शत्रु": ["सूर्य", "चंद्रमा", "मंगल"] }
};

const bhavaFruits = {
    1: "स्वास्थ्य लाभ व तेज वृद्धि",
    4: "भवन, वाहन व गृह सुख",
    5: "सुसंतति, विद्या व इष्ट कृपा",
    7: "दाम्पत्य सुख व साझेदारी लाभ",
    9: "भाग्य उन्नति व स्थिर लक्ष्मी दायक",
    10: "कर्म क्षेत्र में पूर्ण सफलता",
    11: "नित्य लाभ व आय वृद्धि"
};

function getCleanFirstChar(str) {
    if(!str) return '';
    return str.trim().charAt(0);
}

function getRashiDetails(char) {
    for (let rashi of rashiMatrix) {
        if (rashi.chars.includes(char)) return rashi;
    }
    for (let rashi of rashiMatrix) {
        for(let c of rashi.chars) {
            if(c.startsWith(char) || char.startsWith(c)) return rashi;
        }
    }
    return { id: 5, name: "सामान्य", lord: "सूर्य" }; // डिफ़ॉल्ट सिंह
}

function checkPlanetaryRelation(lord1, lord2) {
    if (lord1 === lord2) return "परम मित्र";
    if (friendshipMap[lord1] && friendshipMap[lord1].मित्र.includes(lord2)) return "मित्र राशि";
    if (friendshipMap[lord1] && friendshipMap[lord1].शत्रु.includes(lord2)) return "शत्रु राशि";
    return "सम राशि";
}

function calculateBhava(lagnaId, rashiId) {
    // लग्न भाव से राशि की दूरी ज्ञात करना
    let bhava = (rashiId - lagnaId + 12) % 12 + 1;
    return bhava;
}

function generateCompleteMatrix() {
    let userName = document.getElementById('userName').value.trim();
    let selectedLagna = document.getElementById('userLagna').value;
    let tableBody = document.getElementById('tableBody');
    let tableContainer = document.getElementById('tableContainer');
    let infoBox = document.getElementById('infoBox');
    let lagnaTh = document.getElementById('lagnaTh');
    
    if(!userName) {
        alert("कृपया साधक का नाम दर्ज करें।");
        return;
    }
    
    let uChar = getCleanFirstChar(userName);
    let uVarga = vargaMap[uChar] || 1;
    let userRashi = getRashiDetails(uChar);
    
    let isLagnaAvailable = (selectedLagna !== "none");
    let lagnaId = parseInt(selectedLagna);
    
    infoBox.style.display = "block";
    let infoText = `साधक का नाम: <b>${userName}</b> | मुख्य वर्ण: <b>${uChar}</b> | नाम राशि: <b>${userRashi.name} (${userRashi.lord})</b>`;
    if(isLagnaAvailable) {
        let lagnaName = document.getElementById('userLagna').options[document.getElementById('userLagna').selectedIndex].text;
        infoText += ` | चुना गया लग्न: <b>${lagnaName} लग्न</b>`;
        lagnaTh.style.display = "table-cell";
    } else {
        lagnaTh.style.display = "none";
    }
    infoBox.innerHTML = infoText;
    
    tableBody.innerHTML = "";
    
    allHindiAlphabets.forEach(charItem => {
        let mVarga = vargaMap[charItem] || 1;
        
        // 1. सिद्ध-साध्य दूरी
        let dist = ((mVarga - uVarga + 8) % 8) + 1;
        if(dist === 0) dist = 8;
        
        let cakraResult = "";
        if ([1, 5].includes(dist)) { cakraResult = "<span class='badge-shubh'>सिद्ध</span>"; }
        else if ([2, 6].includes(dist)) { cakraResult = "<span class='badge-sadhya'>साध्य</span>"; }
        else if ([3, 7].includes(dist)) { cakraResult = "<span class='badge-shubh'>सुसिद्ध</span>"; }
        else if ([4, 8].includes(dist)) { cakraResult = "<span class='badge-tyajya'>अरि (शत्रु)</span>"; }
        
        // 2. राशि मैत्री
        let mantraRashi = getRashiDetails(charItem);
        let rashiRelation = checkPlanetaryRelation(userRashi.lord, mantraRashi.lord);
        
        let rashiBadge = "<span>" + rashiRelation + "</span>";
        if(rashiRelation === "शत्रु राशि") rashiBadge = "<span class='badge-tyajya'>शत्रु राशि</span>";
        if(rashiRelation.includes("मित्र")) rashiBadge = "<span class='badge-shubh'>" + rashiRelation + "</span>";

        // 3. गृहस्थ साधक वरीयता निर्णय
        let finalDecision = "";
        let isAcceptable = true;
        
        if (dist === 4 || dist === 8 || rashiRelation === "शत्रु राशि") {
            finalDecision = "<span class='badge-tyajya'>सर्वथा त्याज्य (महादोष)</span>";
            isAcceptable = false;
        } else if ((dist === 3 || dist === 7) && rashiRelation.includes("मित्र")) {
            finalDecision = "<span class='badge-shubh'>प्रथम वरीयता (सर्वश्रेष्ठ सात्विक)</span>";
        } else if (dist === 1 || dist === 5) {
            if (rashiRelation.includes("मित्र") || rashiRelation === "सम राशि") {
                finalDecision = "<span class='badge-shubh'>द्वितीय वरीयता (उत्तम फलदायी)</span>";
            } else {
                finalDecision = "<span class='badge-sadhya'>तृतीय वरीयता (सामान्य साध्य)</span>";
            }
        } else if (dist === 2 || dist === 6) {
            finalDecision = "<span class='badge-sadhya'>तृतीय वरीयता (सामान्य साध्य)</span>";
        } else {
            finalDecision = "<span class='badge-sadhya'>मध्यम</span>";
        }
        
        // 4. लग्न भाव फल की गणना (केवल स्वीकार्य मंत्रों के लिए)
        let lagnaTdStr = "";
        if(isLagnaAvailable) {
            if(isAcceptable) {
                let bhava = calculateBhava(lagnaId, mantraRashi.id);
                if (bhavaFruits[bhava]) {
                    lagnaTdStr = `<td style="background-color: #f4f9f4;"><span class="badge-lagna">${bhava} भाव: ${bhavaFruits[bhava]}</span></td>`;
                } else {
                    lagnaTdStr = `<td><span style="color: #777;">${bhava} भाव (सामान्य फल)</span></td>`;
                }
            } else {
                lagnaTdStr = `<td><span style="color: #c0392b; font-weight: bold;">--</span></td>`;
            }
        }
        
        let row = `<tr>
            <td><b>'${charItem}'</b></td>
            <td>${mantraRashi.name} (${mantraRashi.lord})</td>
            <td>${rashiBadge}</td>
            <td>${cakraResult} (दूरी: ${dist})</td>
            <td>${finalDecision}</td>
            ${isLagnaAvailable ? lagnaTdStr : ''}
        </tr>`;
        
        tableBody.innerHTML += row;
    });
    
    tableContainer.style.display = "block";
}
</script>

</body>
</html>
