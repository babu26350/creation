<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Quiz Leaderboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
  min-height:100vh;
  color:white;
  padding:20px;
}

.container{
  max-width:1200px;
  margin:auto;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  flex-wrap:wrap;
  margin-bottom:25px;
}

.logo{
  font-size:32px;
  font-weight:700;
  background:linear-gradient(90deg,#38bdf8,#818cf8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.refresh-btn{
  border:none;
  padding:12px 18px;
  border-radius:14px;
  cursor:pointer;
  font-weight:600;
  color:white;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  transition:0.3s;
}

.refresh-btn:hover{
  transform:translateY(-2px);
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
  margin-bottom:25px;
}

.stat-box{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border-radius:22px;
  padding:24px;
  text-align:center;
}

.stat-title{
  font-size:15px;
  opacity:0.8;
}

.stat-number{
  font-size:34px;
  font-weight:700;
  margin-top:10px;
  color:#38bdf8;
}

.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:24px;
  padding:20px;
  overflow:hidden;
  box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.table-container{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:rgba(255,255,255,0.08);
  padding:16px;
  font-size:14px;
  font-weight:600;
  white-space:nowrap;
}

td{
  padding:16px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.06);
  white-space:nowrap;
}

tr:hover{
  background:rgba(255,255,255,0.04);
}

.rank-badge{
  padding:6px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
}

.rank-1{
  background:#facc15;
  color:black;
}

.rank-2{
  background:#cbd5e1;
  color:black;
}

.rank-3{
  background:#fb923c;
  color:black;
}

.pass{
  color:#4ade80;
  font-weight:700;
}

.fail{
  color:#f87171;
  font-weight:700;
}

.loading{
  text-align:center;
  padding:40px;
  font-size:20px;
}

.hidden{
  display:none;
}

.cutoff-box{
  margin-top:25px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  padding:24px;
}

.cutoff-title{
  font-size:24px;
  font-weight:600;
  margin-bottom:20px;
}

.cutoff-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:18px;
}

.cutoff-item{
  background:rgba(255,255,255,0.05);
  border-radius:18px;
  padding:20px;
  text-align:center;
}

.cutoff-item h3{
  margin-bottom:10px;
}

@media(max-width:700px){

  .logo{
    font-size:24px;
  }

  th,td{
    padding:12px;
    font-size:12px;
  }

}

</style>
</head>
<body>

<div class="container">

  <div class="header">

    <div class="logo">
      Quiz Rank & Cutoff
    </div>

    <button class="refresh-btn" onclick="loadLeaderboard()">
      Refresh
    </button>

  </div>

  <div class="stats-grid">

    <div class="stat-box">
      <div class="stat-title">Total Candidates</div>
      <div class="stat-number" id="totalCandidates">0</div>
    </div>

    <div class="stat-box">
      <div class="stat-title">Highest Score</div>
      <div class="stat-number" id="highestScore">0</div>
    </div>

    <div class="stat-box">
      <div class="stat-title">Average Score</div>
      <div class="stat-number" id="averageScore">0</div>
    </div>

  </div>

  <div class="card">

    <div class="table-container">

      <table>

        <thead>

          <tr>
            <th>Rank</th>
            <th>Candidate ID</th>
            <th>Test ID</th>
            <th>Obtained Marks</th>
            <th>Total Marks</th>
            <th>Percentage</th>
            <th>Duration</th>
            <th>Submitted At</th>
            <th>Status</th>
          </tr>

        </thead>

        <tbody id="leaderboardBody"></tbody>

      </table>

    </div>

    <div class="loading hidden" id="loading">
      Loading...
    </div>

  </div>

  <div class="cutoff-box">

    <div class="cutoff-title">
      Cutoff Categories
    </div>

    <div class="cutoff-grid">

      <div class="cutoff-item">
        <h3>Excellent</h3>
        <p>90%+</p>
      </div>

      <div class="cutoff-item">
        <h3>Good</h3>
        <p>75%+</p>
      </div>

      <div class="cutoff-item">
        <h3>Average</h3>
        <p>50%+</p>
      </div>

      <div class="cutoff-item">
        <h3>Needs Improvement</h3>
        <p>Below 50%</p>
      </div>

    </div>

  </div>

</div>

<script>

const RESULT_API =
'https://654f6363358230d8f0cd4325.mockapi.io/content/person';

async function loadLeaderboard(){

  try{

    document
      .getElementById('loading')
      .classList
      .remove('hidden');

    const response = await fetch(RESULT_API);

    const data = await response.json();

    // ALL DATA DIRECTLY
    const filteredData = data;

    // SORT BY MARKS
    filteredData.sort((a,b)=>{

      return (
        Number(b.obtainedMarks || 0) -
        Number(a.obtainedMarks || 0)
      );

    });

    // STATS
    document
      .getElementById('totalCandidates')
      .innerText = filteredData.length;

    const highest =
      Math.max(
        ...filteredData.map(
          item=>Number(item.obtainedMarks || 0)
        )
      );

    document
      .getElementById('highestScore')
      .innerText = highest;

    const avg =
      filteredData.reduce((acc,item)=>{

        return (
          acc +
          Number(item.obtainedMarks || 0)
        );

      },0) / filteredData.length;

    document
      .getElementById('averageScore')
      .innerText = avg.toFixed(1);

    // TABLE
    const tbody =
      document.getElementById('leaderboardBody');

    tbody.innerHTML = '';

    filteredData.forEach((item,index)=>{

      const obtained =
        Number(item.obtainedMarks || 0);

      const total =
        Number(item.totalMarks || 0);

      const percentage =
        total > 0
        ? ((obtained / total) * 100)
        : 0;

      let status = 'FAIL';
      let statusClass = 'fail';

      if(percentage >= 50){
        status = 'PASS';
        statusClass = 'pass';
      }

      let rankBadge = '';

      if(index === 0){

        rankBadge =
        '<span class="rank-badge rank-1">#1</span>';

      }
      else if(index === 1){

        rankBadge =
        '<span class="rank-badge rank-2">#2</span>';

      }
      else if(index === 2){

        rankBadge =
        '<span class="rank-badge rank-3">#3</span>';

      }
      else{

        rankBadge = `#${index+1}`;

      }

      tbody.innerHTML += `

      <tr>

        <td>${rankBadge}</td>

        <td>
          ${item.candidateId || '-'}
        </td>

        <td>
          ${item.testId || '-'}
        </td>

        <td>
          ${obtained}
        </td>

        <td>
          ${total}
        </td>

        <td>
          ${percentage.toFixed(1)}%
        </td>

        <td>
          ${item.durationSeconds || 0}s
        </td>

        <td>
          ${item.submittedAt || '-'}
        </td>

        <td class="${statusClass}">
          ${status}
        </td>

      </tr>

      `;

    });

    document
      .getElementById('loading')
      .classList
      .add('hidden');

  }catch(error){

    console.log(error);

    alert('Failed To Load Data');

  }

}

loadLeaderboard();

</script>

</body>
  </html>
