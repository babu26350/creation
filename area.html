<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Land Area Calculator Pro</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

.header{
background:#0f766e;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

#map{
height:65vh;
width:100%;
}

.controls{
padding:10px;
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
background:white;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
font-size:14px;
font-weight:bold;
cursor:pointer;
}

.locationBtn{
background:#f59e0b;
color:white;
}

.areaBtn{
background:#16a34a;
color:white;
}

.resetBtn{
background:#dc2626;
color:white;
}

.undoBtn{
background:#7c3aed;
color:white;
}

.result{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
line-height:1.8;
font-size:16px;
}

.pointCount{
color:#0f766e;
font-weight:bold;
}

.leaflet-control-layers{
font-size:14px;
}

</style>
</head>
<body>

<div class="header">
🌾 Land Area Calculator Pro
</div>

<div id="map"></div>

<div class="controls">

<button class="locationBtn"
onclick="getLocation()">
📍 My Location
</button>

<button class="areaBtn"
onclick="calculateArea()">
📐 Calculate Area
</button>

<button class="undoBtn"
onclick="undoPoint()">
↩ Undo
</button>

<button class="resetBtn"
onclick="resetMap()">
🗑 Reset
</button>

</div>

<div id="result" class="result">

<p class="pointCount">
कुल पॉइंट : 0
</p>

<p>
मैप पर टैप करके खेत की सीमा चुनें।
</p>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>

/* ---------------- MAP LAYERS ---------------- */

const street = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
);

const satellite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
attribution:'© Esri Satellite'
}
);

const map = L.map('map',{
center:[26.2389,73.0243],
zoom:14,
layers:[street]
});

const baseMaps = {
"🗺 Geography Map": street,
"🛰 Satellite View": satellite
};

L.control.layers(baseMaps).addTo(map);

/* ---------------- VARIABLES ---------------- */

let points = [];
let markers = [];
let polygon = null;

/* ---------------- MAP CLICK ---------------- */

map.on("click",function(e){

const lat = e.latlng.lat;
const lng = e.latlng.lng;

points.push([lng,lat]);

const marker = L.marker([lat,lng]).addTo(map);

markers.push(marker);

drawPolygon();

});

/* ---------------- DRAW POLYGON ---------------- */

function drawPolygon(){

if(polygon){

map.removeLayer(polygon);

}

if(points.length >= 3){

const latlngs =
points.map(p=>[p[1],p[0]]);

polygon = L.polygon(
latlngs,
{
color:"#16a34a",
weight:3,
fillOpacity:0.3
}
).addTo(map);

}

document.getElementById("result")
.innerHTML=
`
<p class="pointCount">
कुल पॉइंट : ${points.length}
</p>

<p>
मैप पर टैप करके खेत की सीमा चुनें।
</p>
`;

}

/* ---------------- CALCULATE ---------------- */

function calculateArea(){

if(points.length < 3){

alert("कम से कम 3 पॉइंट चुनें");

return;

}

const poly = turf.polygon([
[...points, points[0]]
]);

const sqm =
turf.area(poly);

const sqft =
sqm * 10.7639;

const acre =
sqm / 4046.8564224;

const hectare =
sqm / 10000;

const bigha =
acre / 0.625;

/* राजस्थान अनुमानित */

document.getElementById("result")
.innerHTML = `

<h3>📊 क्षेत्रफल रिपोर्ट</h3>

<hr>

<p>
📏 Square Meter :
<b>${sqm.toFixed(2)}</b>
</p>

<p>
📐 Square Feet :
<b>${sqft.toFixed(2)}</b>
</p>

<p>
🌾 Acre :
<b>${acre.toFixed(4)}</b>
</p>

<p>
🏞 Hectare :
<b>${hectare.toFixed(4)}</b>
</p>

<p>
🌿 Rajasthan Bigha :
<b>${bigha.toFixed(4)}</b>
</p>

<p>
📍 Boundary Points :
<b>${points.length}</b>
</p>

`;

}

/* ---------------- UNDO ---------------- */

function undoPoint(){

if(points.length===0)
return;

points.pop();

const marker =
markers.pop();

map.removeLayer(marker);

drawPolygon();

}

/* ---------------- RESET ---------------- */

function resetMap(){

markers.forEach(m=>{

map.removeLayer(m);

});

markers=[];

points=[];

if(polygon){

map.removeLayer(polygon);

polygon=null;

}

document.getElementById("result")
.innerHTML=
`
<p class="pointCount">
कुल पॉइंट : 0
</p>

<p>
मैप पर टैप करके खेत की सीमा चुनें।
</p>
`;

}

/* ---------------- GPS ---------------- */

function getLocation(){

if(!navigator.geolocation){

alert("Geolocation Supported नहीं है");

return;

}

navigator.geolocation.getCurrentPosition(

function(position){

const lat =
position.coords.latitude;

const lng =
position.coords.longitude;

map.setView(
[lat,lng],
19
);

L.marker([lat,lng])
.addTo(map)
.bindPopup("📍 आपकी वर्तमान लोकेशन")
.openPopup();

},

function(){

alert("लोकेशन प्राप्त नहीं हुई");

},

{
enableHighAccuracy:true
}

);

}

</script>

</body>
 </html>
