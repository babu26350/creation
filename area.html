<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Land Area Calculator Pro</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.header{
background:#0f766e;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
text-align:center;
}

#map{
height:70vh;
width:100%;
}

.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
padding:10px;
background:#fff;
}

button{
padding:12px 15px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
color:white;
}

.loc{
background:#f59e0b;
}

.calc{
background:#16a34a;
}

.undo{
background:#7c3aed;
}

.reset{
background:#dc2626;
}

.result{
margin:10px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
line-height:1.8;
}

</style>

</head>
<body>

<div class="header">
🌾 Land Area Calculator Pro
</div>

<div id="map"></div>

<div class="controls">

<button class="loc"
onclick="getLocation()">
📍 My Location
</button>

<button class="calc"
onclick="calculateArea()">
📐 Calculate
</button>

<button class="undo"
onclick="undoPoint()">
↩ Undo
</button>

<button class="reset"
onclick="resetMap()">
🗑 Reset
</button>

</div>

<div id="result" class="result">

कुल पॉइंट : 0

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>

/* MAP */

const osm = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:22
}
);

const googleSat = L.tileLayer(
'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
{
maxZoom:22
}
);

const map = L.map('map',{
center:[26.2389,73.0243],
zoom:17,
maxZoom:22,
layers:[googleSat]
});

L.control.layers({
"Satellite":googleSat,
"Map":osm
}).addTo(map);

/* VARIABLES */

let points=[];
let markers=[];
let polygon=null;

/* CLICK */

map.on('click',function(e){

let lat=e.latlng.lat;
let lng=e.latlng.lng;

points.push([lng,lat]);

let marker=L.marker([lat,lng]).addTo(map);

markers.push(marker);

drawPolygon();

});

/* POLYGON */

function drawPolygon(){

if(polygon){

map.removeLayer(polygon);

}

if(points.length>=3){

polygon=L.polygon(

points.map(p=>[p[1],p[0]]),

{
color:'red',
weight:3,
fillOpacity:.25
}

).addTo(map);

}

document.getElementById("result").innerHTML=
`
कुल पॉइंट : ${points.length}
`;

}

/* CALCULATE */

function calculateArea(){

if(points.length<3){

alert("कम से कम 3 पॉइंट चुनें");

return;

}

const poly=turf.polygon([
[...points,points[0]]
]);

const sqm=turf.area(poly);

const sqft=sqm*10.7639;

const acre=sqm/4046.856;

const hectare=sqm/10000;

const bigha=acre/0.625;

document.getElementById("result").innerHTML=

`
<h3>📊 क्षेत्रफल रिपोर्ट</h3>

Square Meter :
<b>${sqm.toFixed(2)}</b><br>

Square Feet :
<b>${sqft.toFixed(2)}</b><br>

Acre :
<b>${acre.toFixed(4)}</b><br>

Hectare :
<b>${hectare.toFixed(4)}</b><br>

Rajasthan Bigha :
<b>${bigha.toFixed(4)}</b>

`;

}

/* GPS */

function getLocation(){

navigator.geolocation.getCurrentPosition(

function(pos){

const lat=
pos.coords.latitude;

const lng=
pos.coords.longitude;

map.setView(
[lat,lng],
21
);

/* कोई Marker नहीं */

/* कोई Point Add नहीं */

},

function(){

alert("Location नहीं मिली");

},

{
enableHighAccuracy:true
}

);

}

/* UNDO */

function undoPoint(){

if(points.length===0)return;

points.pop();

let m=markers.pop();

map.removeLayer(m);

drawPolygon();

}

/* RESET */

function resetMap(){

markers.forEach(m=>{

map.removeLayer(m);

});

markers=[];

points=[];

if(polygon){

map.removeLayer(polygon);

polygon=null;

}

document.getElementById("result").innerHTML=
"कुल पॉइंट : 0";

}

</script>

</body>
 </html>
