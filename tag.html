<script>
function sendWhatsApp(){

let selected=[];

document.querySelectorAll('input[type="checkbox"]:checked')
.forEach(item=>{
selected.push(item.value);
});

if(selected.length===0){
alert("कम से कम एक Skill चुनें");
return;
}

let message=
"Fiber Employee Skills:%0A%0A"+
selected.join("%0A");

window.open(
"https://wa.me/916378910603?text="+message,
"_blank"
);

}
