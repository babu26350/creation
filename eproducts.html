<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>SS Groups E Products</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:
radial-gradient(circle at top left,#1c2b36 0%,transparent 40%),
radial-gradient(circle at bottom right,#243847 0%,transparent 35%),
linear-gradient(135deg,#111827,#16222d,#1f2f3d);

min-height:100vh;

padding:20px;

color:#eef3f7;

overflow-x:hidden;

}

/* HEADER */

.header{

width:100%;

padding:25px;

border-radius:24px;

margin-bottom:25px;

background:rgba(20,28,36,0.72);

backdrop-filter:blur(8px);

border:1px solid rgba(255,255,255,0.06);

box-shadow:
0 8px 20px rgba(0,0,0,0.35),
inset 0 1px 0 rgba(255,255,255,0.03);

}

.header h1{

text-align:center;

font-size:2.2rem;

font-weight:700;

letter-spacing:1px;

}

/* GRID */

.main-grid{

display:grid;

grid-template-columns:380px 1fr;

gap:25px;

align-items:start;

}

/* CARD */

.card{

background:rgba(20,28,36,0.72);

backdrop-filter:blur(8px);

border:1px solid rgba(255,255,255,0.06);

border-radius:24px;

padding:25px;

box-shadow:
0 8px 20px rgba(0,0,0,0.35),
inset 0 1px 0 rgba(255,255,255,0.03);

}

/* FORM */

.form-title{

font-size:1.5rem;

font-weight:600;

margin-bottom:22px;

text-align:center;

}

.input-group{

margin-bottom:18px;

}

.input-group label{

display:block;

margin-bottom:8px;

font-weight:600;

color:#dbe7ef;

}

.input-group input,
.input-group textarea{

width:100%;

padding:14px;

border-radius:14px;

border:1px solid rgba(255,255,255,0.05);

outline:none;

font-size:15px;

background:rgba(255,255,255,0.05);

color:#eef2f5;

transition:0.3s;

font-family:'Poppins',sans-serif;

}

.input-group textarea{

height:130px;

resize:none;

}

.input-group input:focus,
.input-group textarea:focus{

border:1px solid rgba(0,184,148,0.5);

box-shadow:
0 0 0 3px rgba(0,184,148,0.12);

background:rgba(255,255,255,0.07);

}

.input-group input::placeholder,
.input-group textarea::placeholder{

color:#aebdc7;

}

/* IMAGE PREVIEW */

.preview-box{

width:100%;

height:240px;

border-radius:18px;

overflow:hidden;

margin-top:10px;

background:#0d141b;

border:1px dashed rgba(255,255,255,0.08);

}

.preview-box img{

width:100%;

height:100%;

object-fit:cover;

}

/* BUTTONS */

.button-group{

display:flex;

gap:12px;

flex-wrap:wrap;

margin-top:22px;

}

button{

flex:1;

border:none;

padding:14px;

border-radius:14px;

font-weight:600;

cursor:pointer;

transition:0.3s;

font-size:15px;

}

/* SUBMIT */

.submit-btn{

background:#00a884;

color:white;

}

.submit-btn:hover{

background:#009174;

transform:translateY(-2px);

}

/* UPDATE */

.update-btn{

background:#1976d2;

color:white;

}

.update-btn:hover{

background:#135fb0;

transform:translateY(-2px);

}

/* RESET */

.reset-btn{

background:#d64545;

color:white;

}

.reset-btn:hover{

background:#ba3030;

transform:translateY(-2px);

}

/* TABLE */

.table-title{

font-size:1.5rem;

font-weight:600;

margin-bottom:20px;

}

.table-wrapper{

overflow:auto;

}

table{

width:100%;

border-collapse:collapse;

min-width:850px;

}

/* HEADINGS */

th{

background:#00a884;

color:white;

padding:16px;

text-align:left;

font-weight:600;

}

/* CELLS */

td{

padding:15px;

border-bottom:1px solid rgba(255,255,255,0.06);

background:rgba(255,255,255,0.015);

color:#dde7ee;

vertical-align:top;

}

tr{

transition:0.3s;

}

tr:hover{

background:rgba(255,255,255,0.03);

}

/* PRODUCT IMAGE */

.table-image{

width:90px;

height:90px;

object-fit:cover;

border-radius:14px;

border:2px solid rgba(255,255,255,0.08);

}

/* PRICE */

.price-tag{

font-weight:700;

color:#00d48f;

font-size:16px;

}

/* DESCRIPTION */

.content-preview{

max-width:300px;

overflow:hidden;

display:-webkit-box;

-webkit-line-clamp:3;

-webkit-box-orient:vertical;

font-size:14px;

line-height:1.7;

}

/* ACTION BUTTON */

.action-btn{

border:none;

padding:10px 15px;

border-radius:10px;

font-weight:600;

cursor:pointer;

transition:0.3s;

color:white;

}

/* DELETE */

.delete-btn{

background:#cf3f3f;

}

.delete-btn:hover{

background:#b52d2d;

}

/* EDIT */

.edit-btn{

background:#2878c8;

}

.edit-btn:hover{

background:#1b63aa;

}

/* SCROLLBAR */

::-webkit-scrollbar{

width:10px;

height:10px;

}

::-webkit-scrollbar-track{

background:#17232d;

}

::-webkit-scrollbar-thumb{

background:#2e4758;

border-radius:20px;

}

::-webkit-scrollbar-thumb:hover{

background:#3f6278;

}

/* RESPONSIVE */

@media(max-width:900px){

.main-grid{

grid-template-columns:1fr;

}

.header h1{

font-size:1.7rem;

}

.card{

padding:18px;

}

button{

min-width:100%;

}

table{

min-width:850px;

}

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<h1>🛒 SS Groups E Products Dashboard</h1>

</div>

<!-- MAIN GRID -->

<div class="main-grid">

<!-- LEFT FORM -->

<div class="card">

<h2 class="form-title">Add New Product</h2>

<!-- TITLE -->

<div class="input-group">

<label>Product Title</label>

<input
type="text"
id="title"
placeholder="Enter product title"
/>

</div>

<!-- PRICE -->

<div class="input-group">

<label>Price</label>

<input
type="number"
id="price"
placeholder="Enter product price"
/>

</div>

<!-- DESCRIPTION -->

<div class="input-group">

<label>Description</label>

<textarea
id="description"
placeholder="Write product description..."
></textarea>

</div>

<!-- IMAGE -->

<div class="input-group">

<label>Image URL</label>

<input
type="text"
id="image"
placeholder="Paste image or Google Drive URL"
/>

</div>

<!-- PREVIEW -->

<div class="preview-box">

<img
id="previewImage"
src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?q=80&w=1200"
alt="preview"
/>

</div>

<!-- BUTTONS -->

<div class="button-group">

<button
class="submit-btn"
onclick="sendReq()"
>
Submit
</button>

<button
class="update-btn"
onclick="updateData()"
>
Update
</button>

<button
class="reset-btn"
onclick="resetForm()"
>
Reset
</button>

</div>

</div>

<!-- RIGHT TABLE -->

<div class="card">

<h2 class="table-title">📦 Products List</h2>

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>Title</th>

<th>Image</th>

<th>Price</th>

<th>Description</th>

<th>Delete</th>

<th>Edit</th>

</tr>

</thead>

<tbody id="lis"></tbody>

</table>

</div>

</div>

</div>

<script>

/* =========================
GLOBAL VARIABLES
========================= */

let apiId = "";

let allData = [];

/* =========================
INPUTS
========================= */

const title = document.getElementById("title");

const price = document.getElementById("price");

const description = document.getElementById("description");

const image = document.getElementById("image");

const previewImage = document.getElementById("previewImage");

/* =========================
GOOGLE DRIVE LINK CONVERTER
========================= */

function checkAndConvertDriveLink(url){

const trimmedUrl = url.trim();

const regExp = /\/file\/d\/([a-zA-Z0-9-_]+)/;

const matches = trimmedUrl.match(regExp);

if(matches && matches[1]){

return `https://lh3.googleusercontent.com/d/${matches[1]}`;

}

return trimmedUrl;

}

/* =========================
IMAGE PREVIEW
========================= */

image.addEventListener("input",()=>{

if(image.value.trim() !== ""){

const convertedUrl =
checkAndConvertDriveLink(image.value);

image.value = convertedUrl;

previewImage.src = convertedUrl;

}else{

previewImage.src =
"https://images.unsplash.com/photo-1496181133206-80ce9b88a853?q=80&w=1200";

}

});

/* =========================
FETCH PRODUCTS
========================= */

function reFresh(){

fetch("https://6a0c6aee5aa893e1015be4b8.mockapi.io/Task/products")

.then(res => {

if(!res.ok){

throw new Error("API Response Error");

}

return res.json();

})

.then(data => {

allData = data.reverse();

document.getElementById("lis").innerHTML = "";

allData.forEach(item => {

document.getElementById("lis").innerHTML += `

<tr>

<td>
${safeValue(item.title)}
</td>
<td>
${safeValue(item.category)}
</td>
<td>

<img
class="table-image"
src="${safeValue(item.image)}"
alt="img"
/>

</td>

<td>

<div class="price-tag">
₹ ${safeValue(item.price)}
</div>

</td>

<td>

<div class="content-preview">

${escapeHtml(removeHtmlTags(item.description))}

</div>

</td>

<td>

<button
class="action-btn delete-btn"
onclick="deleteApi('${item.id}')"
>

Delete

</button>

</td>

<td>

<button
class="action-btn edit-btn"
onclick="editData('${item.id}')"
>

Edit

</button>

</td>

</tr>

`;

});

})

.catch(error => {

console.log(error);

alert("API Fetch Error");

});

}

/* =========================
SAFE VALUE
========================= */

function safeValue(value){

if(value == null || value == undefined){

return "";

}

return value;

}

/* =========================
REMOVE HTML TAGS
========================= */

function removeHtmlTags(str){

if(!str){

return "";

}

const div = document.createElement("div");

div.innerHTML = str;

return div.textContent || div.innerText || "";

}

/* =========================
ESCAPE HTML
========================= */

function escapeHtml(text){

const div = document.createElement("div");

div.innerText = text;

return div.innerHTML;

}

/* =========================
ADD PRODUCT
========================= */

function sendReq(){

if(

title.value.trim() == "" ||
category.value.trim() == "descriptionvalue.trim() == "" ||

description.value.trim() == "" ||

image.value.trim() == ""

){

alert("Please fill all fields");

return;

}

const finalImageUrl =
checkAndConvertDriveLink(image.value);

const obj = {

title:title.value,
category:category.value,
price:price.value,

description:description.value,

image:finalImageUrl

};

fetch("https://6a0c6aee5aa893e1015be4b8.mockapi.io/Task/products",{

method:"POST",

headers:{
"content-type":"application/json"
},

body:JSON.stringify(obj)

})

.then(res => {

if(!res.ok){

throw new Error("Submit Error");

}

return res.json();

})

.then(()=>{

alert("Product Added Successfully");

resetForm();

reFresh();

})

.catch(error => {

console.log(error);

alert("Submit Error");

});

}

/* =========================
EDIT PRODUCT
========================= */

function editData(id){

apiId = id;

const matchedData =
allData.find(item => item.id == id);

if(!matchedData){

alert("Data Not Found");

return;

}

title.value =
safeValue(matchedData.title);
category.value =
safeValue(matchedData.category);
price.value =
safeValue(matchedData.price);

description.value =
safeValue(matchedData.description);

image.value =
safeValue(matchedData.image);

previewImage.src =
safeValue(matchedData.image);

window.scrollTo({

top:0,

behavior:"smooth"

});

}

/* =========================
UPDATE PRODUCT
========================= */

function updateData(){

if(apiId == ""){

alert("Please select edit first");

return;

}

if(

title.value.trim() == "" ||
category.value.trim() == "" ||
price.value.trim() == "" ||

description.value.trim() == "" ||

image.value.trim() == ""

){

alert("Please fill all fields");

return;

}

const finalImageUrl =
checkAndConvertDriveLink(image.value);

const obj = {

title:title.value,
category:category.value,
price:price.value,

description:description.value,

image:finalImageUrl

};

fetch(`https://6a0c6aee5aa893e1015be4b8.mockapi.io/Task/products/${apiId}`,{

method:"PUT",

headers:{
"content-type":"application/json"
},

body:JSON.stringify(obj)

})

.then(res => {

if(!res.ok){

throw new Error("Update Error");

}

return res.json();

})

.then(()=>{

alert("Updated Successfully");

resetForm();

reFresh();

})

.catch(error => {

console.log(error);

alert("Update Error");

});

}

/* =========================
DELETE PRODUCT
========================= */

function deleteApi(id){

const confirmDelete =
confirm("Delete this product ?");

if(confirmDelete){

fetch(`https://6a0c6aee5aa893e1015be4b8.mockapi.io/Task/products/${id}`,{

method:"DELETE"

})

.then(res => {

if(!res.ok){

throw new Error("Delete Error");

}

return res.json();

})

.then(()=>{

alert("Deleted Successfully");

reFresh();

})

.catch(error => {

console.log(error);

alert("Delete Error");

});

}

}

/* =========================
RESET
========================= */

function resetForm(){

title.value = "";
category.value = "";
price.value = "";

description.value = "";

image.value = "";

previewImage.src =
"https://images.unsplash.com/photo-1496181133206-80ce9b88a853?q=80&w=1200";

apiId = "";

}

/* =========================
INITIAL LOAD
========================= */

reFresh();

</script>

</body>
</html>
