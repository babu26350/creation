<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Astro Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:
radial-gradient(circle at top left,#1d2a35 0%,transparent 40%),
radial-gradient(circle at bottom right,#243847 0%,transparent 35%),
linear-gradient(135deg,#111827,#16222d,#1f2f3d);

min-height:100vh;

padding:20px;

color:#ecf2f7;

overflow-x:hidden;
}

/* HEADER */

.header{

width:100%;

padding:22px;

border-radius:22px;

margin-bottom:25px;

background:rgba(20,28,36,0.75);

backdrop-filter:blur(8px);

border:1px solid rgba(255,255,255,0.05);

box-shadow:
0 10px 25px rgba(0,0,0,0.35),
inset 0 1px 0 rgba(255,255,255,0.03);
}

.header h1{

text-align:center;

font-size:2rem;

font-weight:700;

letter-spacing:1px;
}

/* GRID */

.main-grid{

display:grid;

grid-template-columns:380px 1fr;

gap:25px;

align-items:start;
}

/* CARD */

.card{

background:rgba(20,28,36,0.75);

backdrop-filter:blur(8px);

border:1px solid rgba(255,255,255,0.05);

border-radius:22px;

padding:24px;

box-shadow:
0 10px 25px rgba(0,0,0,0.35),
inset 0 1px 0 rgba(255,255,255,0.03);
}

/* FORM */

.form-title{

font-size:1.4rem;

font-weight:600;

margin-bottom:22px;

text-align:center;
}

.input-group{

margin-bottom:18px;
}

.input-group label{

display:block;

margin-bottom:8px;

font-weight:600;

color:#dce8f0;
}

.input-group input{

width:100%;

padding:14px;

border:none;

outline:none;

border-radius:14px;

background:rgba(255,255,255,0.05);

color:#fff;

font-size:15px;

border:1px solid rgba(255,255,255,0.04);

transition:0.3s;
}

.input-group input:focus{

border:1px solid rgba(0,184,148,0.5);

box-shadow:0 0 0 3px rgba(0,184,148,0.12);
}

.input-group input::placeholder{

color:#b7c4cc;
}

/* IMAGE PREVIEW */

.preview-box{

width:100%;

height:220px;

border-radius:18px;

overflow:hidden;

background:#10161c;

border:1px dashed rgba(255,255,255,0.08);

margin-top:15px;
}

.preview-box img{

width:100%;

height:100%;

object-fit:cover;
}

/* BUTTONS */

.button-group{

display:flex;

gap:12px;

margin-top:22px;

flex-wrap:wrap;
}

button{

flex:1;

border:none;

padding:14px;

border-radius:14px;

font-size:15px;

font-weight:600;

cursor:pointer;

transition:0.3s;
}

.submit-btn{

background:#00a884;

color:#fff;
}

.submit-btn:hover{

background:#009174;

transform:translateY(-2px);
}

.update-btn{

background:#2878c8;

color:#fff;
}

.update-btn:hover{

background:#1c65ad;

transform:translateY(-2px);
}

.reset-btn{

background:#d64545;

color:#fff;
}

.reset-btn:hover{

background:#be3131;

transform:translateY(-2px);
}

/* TABLE */

.table-title{

font-size:1.4rem;

font-weight:600;

margin-bottom:20px;
}

.table-wrapper{

overflow:auto;
}

table{

width:100%;

border-collapse:collapse;

min-width:650px;
}

th{

background:#00a884;

padding:16px;

text-align:left;

color:white;

font-weight:600;
}

td{

padding:16px;

border-bottom:1px solid rgba(255,255,255,0.05);

background:rgba(255,255,255,0.015);
}

tr{

transition:0.3s;
}

tr:hover{

background:rgba(255,255,255,0.03);
}

.table-image{

width:75px;

height:75px;

object-fit:cover;

border-radius:14px;

border:2px solid rgba(255,255,255,0.06);
}

/* ACTION BUTTONS */

.action-btn{

border:none;

padding:10px 15px;

border-radius:10px;

font-size:14px;

font-weight:600;

cursor:pointer;

transition:0.3s;

color:white;
}

.edit-btn{

background:#2878c8;
}

.edit-btn:hover{

background:#1c65ad;
}

.delete-btn{

background:#cf3f3f;
}

.delete-btn:hover{

background:#b72f2f;
}

/* SCROLLBAR */

::-webkit-scrollbar{

width:10px;

height:10px;
}

::-webkit-scrollbar-track{

background:#17232d;
}

::-webkit-scrollbar-thumb{

background:#314858;

border-radius:20px;
}

/* RESPONSIVE */

@media(max-width:950px){

.main-grid{

grid-template-columns:1fr;
}

button{

min-width:100%;
}

.header h1{

font-size:1.6rem;
}

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">
<h1>✨ Astro Content Dashboard</h1>
</div>

<!-- MAIN -->

<div class="main-grid">

<!-- LEFT FORM -->

<div class="card">

<h2 class="form-title">Add New Content</h2>

<div class="input-group">
<label>Heading</label>
<input type="text" id="heading" placeholder="Enter heading">
</div>

<div class="input-group">
<label>Image URL</label>
<input type="text" id="image" placeholder="Paste image url">
</div>

<div class="preview-box">

<img
id="previewImage"
src="https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=1200&auto=format&fit=crop"
alt="preview"
>

</div>

<div class="button-group">

<button class="submit-btn" onclick="sendReq()">
Submit
</button>

<button class="update-btn" onclick="updateData()">
Update
</button>

<button class="reset-btn" onclick="resetForm()">
Reset
</button>

</div>

</div>

<!-- RIGHT TABLE -->

<div class="card">

<h2 class="table-title">📚 Content List</h2>

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>Heading</th>
<th>Image</th>
<th>Delete</th>
<th>Edit</th>

</tr>

</thead>

<tbody id="lis"></tbody>

</table>

</div>

</div>

</div>

<script>

let apiId = "";

/* INPUTS */

const heading = document.getElementById("heading");
const image = document.getElementById("image");
const previewImage = document.getElementById("previewImage");

/* IMAGE PREVIEW */

image.addEventListener("input",()=>{

if(image.value.trim() !== ""){

previewImage.src = image.value;

}

});

/* FETCH DATA */

function reFresh(){

fetch("https://660ac426ccda4cbc75dbc0e1.mockapi.io/ser1/astroser2")

.then(res => res.json())

.then(data => {

document.getElementById("lis").innerHTML = "";

data.reverse().forEach(item => {

document.getElementById("lis").innerHTML += `

<tr>

<td>${item.Heading}</td>

<td>
<img
class="table-image"
src="${item.image}"
alt="img"
>
</td>

<td>

<button
class="action-btn delete-btn"
onclick="deleteApi('${item.id}')"
>
Delete
</button>

</td>

<td>

<button
class="action-btn edit-btn"
onclick='editData(
"${item.id}",
${JSON.stringify(item.Heading)},
${JSON.stringify(item.image)}
)'
>
Edit
</button>

</td>

</tr>

`;

});

})

.catch(error => {

console.log(error);

alert("API Fetch Error");

});

}

/* ADD DATA */

function sendReq(){

if(
heading.value.trim() == "" ||
image.value.trim() == ""
){

alert("Please fill all fields");

return;

}

const obj = {

Heading: heading.value,
image: image.value

};

fetch("https://660ac426ccda4cbc75dbc0e1.mockapi.io/ser1/astroser2",{

method:"POST",

headers:{
"content-type":"application/json"
},

body:JSON.stringify(obj)

})

.then(res => res.json())

.then(() => {

alert("Data Added Successfully");

resetForm();

reFresh();

})

.catch(error => {

console.log(error);

alert("Submit Error");

});

}

/* EDIT DATA */

function editData(id,h,img){

apiId = id;

heading.value = h;

image.value = img;

previewImage.src = img;

window.scrollTo({

top:0,
behavior:"smooth"

});

}

/* UPDATE */

function updateData(){

if(apiId == ""){

alert("Please select edit first");

return;

}

const obj = {

Heading: heading.value,
image: image.value

};

fetch(`https://660ac426ccda4cbc75dbc0e1.mockapi.io/ser1/astroser2/${apiId}`,{

method:"PUT",

headers:{
"content-type":"application/json"
},

body:JSON.stringify(obj)

})

.then(res => res.json())

.then(() => {

alert("Updated Successfully");

resetForm();

reFresh();

})

.catch(error => {

console.log(error);

alert("Update Error");

});

}

/* DELETE */

function deleteApi(id){

const confirmDelete = confirm("Delete this item ?");

if(confirmDelete){

fetch(`https://660ac426ccda4cbc75dbc0e1.mockapi.io/ser1/astroser2/${id}`,{

method:"DELETE"

})

.then(() => {

alert("Deleted Successfully");

reFresh();

})

.catch(error => {

console.log(error);

alert("Delete Error");

});

}

}

/* RESET */

function resetForm(){

heading.value = "";

image.value = "";

previewImage.src =
"https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=1200&auto=format&fit=crop";

apiId = "";

}

/* INITIAL LOAD */

reFresh();

</script>

</body>
    </html>
