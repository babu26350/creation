<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Astro Content Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>




*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(
    135deg,
    #1f1f1f,
    #2b2b2b,
    #3b3b3b
    );
    min-height:100vh;
    padding:20px;
    color:#fff;
}

/* HEADER */

.header{
    width:100%;
    padding:25px;
    border-radius:22px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.08);
    margin-bottom:25px;
    box-shadow:0 8px 30px rgba(0,0,0,0.35);
}

.header h1{
    text-align:center;
    font-size:2.2rem;
    font-weight:700;
    color:#ffffff;
    letter-spacing:1px;
}

/* GRID */

.main-grid{
    display:grid;
    grid-template-columns:360px 1fr;
    gap:25px;
}

/* FORM */

.form-card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:22px;
    padding:25px;
    box-shadow:0 8px 30px rgba(0,0,0,0.35);
    height:fit-content;
}

.form-card h2{
    text-align:center;
    margin-bottom:22px;
    font-size:1.5rem;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#e2e2e2;
}

.input-group input,
.input-group textarea{
    width:100%;
    border:none;
    outline:none;
    padding:15px;
    border-radius:14px;
    font-size:15px;
    background:rgba(255,255,255,0.08);
    color:#fff;
    transition:0.3s;
    border:1px solid transparent;
}

.input-group textarea{
    height:140px;
    resize:none;
}

.input-group input::placeholder,
.input-group textarea::placeholder{
    color:#bdbdbd;
}

.input-group input:focus,
.input-group textarea:focus{
    border:1px solid #00b894;
    background:rgba(255,255,255,0.12);
}

/* IMAGE PREVIEW */

.preview-box{
    width:100%;
    height:210px;
    border-radius:18px;
    overflow:hidden;
    background:#222;
    border:2px dashed rgba(255,255,255,0.12);
    margin-top:10px;
}

.preview-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* BUTTONS */

.button-group{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:25px;
}

button{
    flex:1;
    border:none;
    padding:14px;
    border-radius:14px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
}

/* BUTTON COLORS */

.submit-btn{
    background:#00b894;
    color:white;
}

.submit-btn:hover{
    background:#00a884;
}

.edit-btn{
    background:#0984e3;
    color:white;
}

.edit-btn:hover{
    background:#0a74c9;
}

.back-btn{
    background:#d63031;
    color:white;
}

.back-btn:hover{
    background:#c0392b;
}

/* TABLE SECTION */

.table-section{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:22px;
    padding:20px;
    overflow:auto;
    box-shadow:0 8px 30px rgba(0,0,0,0.35);
}

.table-section h2{
    margin-bottom:20px;
    font-size:1.5rem;
}

/* TABLE */

table{
    width:100%;
    min-width:850px;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:16px;
}

thead{
    background:rgba(255,255,255,0.08);
}

th{
    padding:16px;
    text-align:left;
    color:#fff;
    font-weight:600;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

td{
    padding:16px;
    color:#e8e8e8;
    border-bottom:1px solid rgba(255,255,255,0.06);
}

tr{
    transition:0.3s;
}

tr:hover{
    background:rgba(255,255,255,0.05);
}

/* IMAGE */

.table-image{
    width:70px;
    height:70px;
    object-fit:cover;
    border-radius:12px;
    border:2px solid rgba(255,255,255,0.1);
}

/* ACTION BUTTONS */

.action-btn{
    border:none;
    padding:9px 16px;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
    transition:0.3s;
}

.action-btn:hover{
    transform:scale(1.05);
}

.delete{
    background:#e74c3c;
    color:white;
}

.update{
    background:#3498db;
    color:white;
}

/* SECOND TABLE */

.second-table{
    margin-top:30px;
}

/* SCROLLBAR */

::-webkit-scrollbar{
    width:8px;
    height:8px;
}

::-webkit-scrollbar-track{
    background:#2a2a2a;
    border-radius:10px;
}

::-webkit-scrollbar-thumb{
    background:#555;
    border-radius:10px;
}

::-webkit-scrollbar-thumb:hover{
    background:#777;
}

/* RESPONSIVE */

@media(max-width:950px){

.main-grid{
    grid-template-columns:1fr;
}

.header h1{
    font-size:1.7rem;
}

.form-card,
.table-section{
    padding:18px;
}

table{
    min-width:700px;
}

}

@media(max-width:600px){

body{
    padding:12px;
}

.header{
    padding:18px;
}

.header h1{
    font-size:1.4rem;
}

.form-card h2,
.table-section h2{
    font-size:1.2rem;
}

button{
    width:100%;
}

.button-group{
    flex-direction:column;
}

.input-group input,
.input-group textarea{
    padding:13px;
}

    }

@media(max-width:900px){

.main-grid{
    grid-template-columns:1fr;
}

.header h1{
    font-size:1.7rem;
}

}

</style>
</head>

<body>

<div class="header">
    <h1>✨ Astro Content Dashboard</h1>
</div>

<div class="main-grid">

    <!-- LEFT FORM -->

    <div class="form-card">

        <h2>Add New Content</h2>

        <div class="input-group">
            <label>Heading</label>
            <input type="text" id="heading" placeholder="Enter heading">
        </div>

        <div class="input-group">
            <label>Content</label>
            <textarea id="content" placeholder="Write content here..."></textarea>
        </div>

        <div class="input-group">
            <label>Image URL</label>
            <input type="text" id="image" placeholder="Paste image URL">
        </div>

        <div class="preview-box">
            <img id="previewImage"
            src="https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=1200&auto=format&fit=crop"
            alt="">
        </div>

        <div class="button-group">
            <button class="submit-btn" onclick="sendReq()">Submit</button>
            <button class="edit-btn" onclick="updateData()">Update</button>
            <button class="back-btn" onclick="resetForm()">Reset</button>
        </div>

    </div>

    <!-- RIGHT TABLE -->

    <div class="table-section">

        <h2>📚 Content List</h2>

        <table>

            <thead>
                <tr>
                    <th>Heading</th>
                    <th>Content</th>
                    <th>Image</th>
                    <th>Delete</th>
                    <th>Edit</th>
                </tr>
            </thead>

            <tbody id="lis"></tbody>

        </table>

    </div>

</div>

<!-- SECOND TABLE -->

<div class="table-section second-table">

    <h2>👨‍🎓 Student Details</h2>

    <table>

        <thead>
            <tr>
                <th>Name</th>
                <th>Date Of Birth</th>
                <th>Birth Time</th>
                <th>Birth Place</th>
                <th>Phone</th>
            </tr>
        </thead>

        <tbody id="list"></tbody>

    </table>

</div>

<script>

let apiId = "";
let method = "POST";

const heading = document.getElementById("heading");
const content = document.getElementById("content");
const image = document.getElementById("image");
const previewImage = document.getElementById("previewImage");

/* IMAGE PREVIEW */

image.addEventListener("input", () => {

    if(image.value.trim() !== ""){
        previewImage.src = image.value;
    }

});

/* FETCH CONTENT */

function reFresh(){

fetch("https://660ac426ccda4cbc75dbc0e1.mockapi.io/ser1/astroser2")

.then(res => res.json())

.then(data => {

document.getElementById("lis").innerHTML = "";

data.forEach(item => {

document.getElementById("lis").innerHTML += `

<tr>

<td>${item.Heading}</td>

<td>${item.content}</td>

<td>
<img class="table-image" src="${item.image}">
</td>

<td>
<button class="action-btn delete"
onclick="deleteApi('${item.id}')">
Delete
</button>
</td>

<td>
<button class="action-btn update"
onclick="editData(
'${item.id}',
'${item.Heading}',
\`${item.content}\`,
'${item.image}'
)">
Edit
</button>
</td>

</tr>

`;

});

});

}

/* ADD DATA */

function sendReq(){

const obj = {

Heading: heading.value,
content: content.value,
image: image.value

};

fetch("https://660ac426ccda4cbc75dbc0e1.mockapi.io/ser1/astroser2",{

method:"POST",

headers:{
"content-type":"application/json"
},

body:JSON.stringify(obj)

})

.then(res => res.json())

.then(() => {

alert("Data Added Successfully");

resetForm();

reFresh();

});

}

/* EDIT */

function editData(id,h,c,img){

apiId = id;

method = "PUT";

heading.value = h;
content.value = c;
image.value = img;

previewImage.src = img;

window.scrollTo({
top:0,
behavior:"smooth"
});

}

/* UPDATE */

function updateData(){

if(apiId == ""){
alert("Select data first");
return;
}

const obj = {

Heading: heading.value,
content: content.value,
image: image.value

};

fetch(`https://660ac426ccda4cbc75dbc0e1.mockapi.io/ser1/astroser2/${apiId}`,{

method:"PUT",

headers:{
"content-type":"application/json"
},

body:JSON.stringify(obj)

})

.then(res => res.json())

.then(() => {

alert("Updated Successfully");

resetForm();

reFresh();

});

}

/* DELETE */

function deleteApi(id){

const confirmDelete = confirm("Delete this item?");

if(confirmDelete){

fetch(`https://660ac426ccda4cbc75dbc0e1.mockapi.io/ser1/astroser2/${id}`,{

method:"DELETE"

})

.then(() => {

alert("Deleted Successfully");

reFresh();

});

}

}

/* RESET */

function resetForm(){

heading.value = "";
content.value = "";
image.value = "";

previewImage.src =
"https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=1200&auto=format&fit=crop";

apiId = "";

}

/* SECOND API */

function getStudents(){

fetch("https://660ac426ccda4cbc75dbc0e1.mockapi.io/ser1/astroser1")

.then(res => res.json())

.then(data => {

document.getElementById("list").innerHTML = "";

data.forEach(item => {

document.getElementById("list").innerHTML += `

<tr>

<td>${item.Name}</td>
<td>${item.DateOfBirth}</td>
<td>${item.Time}</td>
<td>${item.BirthPlace}</td>
<td>${item.PhoneNo}</td>

</tr>

`;

});

});

}

reFresh();
getStudents();

</script>

</body>
  </html>
