<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase डायरेक्ट अपलोडर</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 40px; background: #f0f4f2; text-align: center; }
        .box { background: white; padding: 30px; border-radius: 12px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { color: #1c2833; margin-top: 0; }
        input[type="file"] { width: 100%; padding: 10px; margin: 15px 0; border: 1px dashed #3ecf8e; border-radius: 6px; background: #f9fbf9; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3ecf8e; color: white; border: none; font-weight: bold; font-size: 16px; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2eaf76; }
        #status { font-weight: bold; margin-top: 15px; color: #555; }
        .link-box { background: #e8f8f0; border: 1px solid #3ecf8e; padding: 12px; margin-top: 20px; border-radius: 6px; word-break: break-all; text-align: left; display: none; }
        .link-box a { color: #2eaf76; font-weight: bold; text-decoration: none; }
        .link-box a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="box">
    <h2>Supabase डायरेक्ट अपलोडर</h2>
    <p style="font-size: 13px; color: #777;">प्रोजेक्ट ID: pxjaphsjxarlehdiwbaq</p>
    
    <input type="file" id="myFile">
    <button onclick="uploadNow()">फाइल अपलोड करें और लिंक पाएं</button>

    <p id="status"></p>
    
    <div id="linkBox" class="link-box">
        <strong>✅ फाइल का सीधा लिंक (Public URL):</strong><br>
        <input type="text" id="urlText" readonly style="width:100%; margin-top:5px; padding:5px; font-size:12px;"><br>
        <a id="fileUrl" href="#" target="_blank" style="display:inline-block; margin-top:8px;">➡️ नए टैब में फाइल खोलें</a>
    </div>
</div>

<script>
    // आपकी लाइव क्रेडेंशियल्स यहाँ सेट कर दी गई हैं
    const SUPABASE_URL = "https://pxjaphsjxarlehdiwbaq.supabase.co";
    const SUPABASE_ANON_KEY = "Sb_publishable_8UiOgkP_KAqMLEFpjd7tCw_5f3zpLiY";

    // Supabase क्लाइंट चालू करें
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function uploadNow() {
        const fileInput = document.getElementById('myFile');
        const statusText = document.getElementById('status');
        const linkBox = document.getElementById('linkBox');
        const fileUrl = document.getElementById('fileUrl');
        const urlText = document.getElementById('urlText');

        if (fileInput.files.length === 0) {
            alert("कृपया पहले एक फाइल चुनें!");
            return;
        }

        const file = fileInput.files[0];
        // फाइल का नाम यूनिक बनाने के लिए आगे टाइमस्टैम्प जोड़ रहे हैं
        const uniqueName = Date.now() + "_" + file.name;

        statusText.innerText = "⏳ फाइल क्लाउड पर अपलोड हो रही है...";
        statusText.style.color = "#333";
        linkBox.style.display = "none";

        // ⚠️ महत्वपूर्ण नोट: मान लेते हैं आपके Supabase Storage में बकेट का नाम 'my-bucket' है।
        // अगर आपके बकेट का नाम कुछ और है (जैसे 'images' या 'test-papers'), तो नीचे दोनों जगह 'my-bucket' बदल लें।
        const bucketName = 'my-bucket'; 

        // 1. फाइल अपलोड करें
        const { data, error } = await supabase
            .storage
            .from(bucketName) 
            .upload(uniqueName, file);

        if (error) {
            statusText.innerText = "❌ एरर आया: " + error.message;
            statusText.style.color = "red";
            console.error(error);
            return;
        }

        // 2. फाइल का डायरेक्ट Public URL प्राप्त करें
        const { data: urlData } = supabase
            .storage
            .from(bucketName)
            .getPublicUrl(uniqueName);

        const finalUrl = urlData.publicUrl;

        // 3. स्क्रीन पर लिंक दिखाएं
        statusText.innerText = "🚀 अपलोड सफलतापूर्वक पूरा हुआ!";
        statusText.style.color = "green";
        
        urlText.value = finalUrl;
        fileUrl.href = finalUrl;
        linkBox.style.display = "block";
    }
</script>

</body>
</html>
