<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Supabase Debug Uploader</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; background: #f4f4f4; text-align: center; }
        .box { background: white; padding: 30px; border-radius: 10px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #3ecf8e; color: white; border: none; font-weight: bold; cursor: pointer; }
        #status { font-weight: bold; margin-top: 15px; color: #333; }
        .error-box { background: #fde8e8; color: #e53e3e; padding: 10px; border-radius: 5px; margin-top: 15px; display: none; text-align: left; word-break: break-all; }
        .link-box { background: #e8f8f0; border: 1px solid #3ecf8e; padding: 10px; margin-top: 15px; word-break: break-all; display: none; text-align: left; }
    </style>
</head>
<body>

<div class="box">
    <h2>Supabase डायरेक्ट अपलोडर (Debug Mode)</h2>
    <input type="file" id="myFile">
    <button onclick="uploadNow()">अपलोड करें</button>

    <p id="status"></p>
    <div id="errorBox" class="error-box"></div>
    
    <div id="linkBox" class="link-box">
        <strong>✅ फाइल का सीधा लिंक:</strong><br>
        <a id="fileUrl" href="#" target="_blank"></a>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://pxjaphsjxarlehdiwbaq.supabase.co";
    const SUPABASE_ANON_KEY = "Sb_publishable_8UiOgkP_KAqMLEFpjd7tCw_5f3zpLiY";

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function uploadNow() {
        const fileInput = document.getElementById('myFile');
        const statusText = document.getElementById('status');
        const errorBox = document.getElementById('errorBox');
        const linkBox = document.getElementById('linkBox');
        const fileUrl = document.getElementById('fileUrl');

        errorBox.style.display = "none";
        linkBox.style.display = "none";

        if (fileInput.files.length === 0) {
            alert("कृपया पहले एक फाइल चुनें!");
            return;
        }

        const file = fileInput.files[0];
        const uniqueName = Date.now() + "_" + file.name;

        statusText.innerText = "⏳ अपलोड हो रहा है... कृपया रुकें...";

        // यहाँ हमने आपके बकेट का नाम 'my-bucket' रखा है
        const { data, error } = await supabase
            .storage
            .from('my-bucket') 
            .upload(uniqueName, file);

        if (error) {
            statusText.innerText = "❌ अपलोड रुक गया!";
            errorBox.innerHTML = "<b>Supabase Error:</b> " + error.message + "<br><br><i>सुझाव: जांचें कि आपके बकेट का नाम 'my-bucket' ही है और उसकी RLS Policy ऑन है।</i>";
            errorBox.style.display = "block";
            console.error("Full Error Details:", error);
            return;
        }

        // URL प्राप्त करना
        const { data: urlData } = supabase
            .storage
            .from('my-bucket')
            .getPublicUrl(uniqueName);

        if(urlData && urlData.publicUrl) {
            statusText.innerText = "🎉 सफलता!";
            fileUrl.href = urlData.publicUrl;
            fileUrl.innerText = urlData.publicUrl;
            linkBox.style.display = "block";
        } else {
            statusText.innerText = "❌ फाइल अपलोड हुई पर लिंक नहीं बन पाया।";
        }
    }
</script>

</body>
</html>
