<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS Infotech Animation</title>
    <style>
        /* पूरे पेज का बैकग्राउंड और अलाइनमेंट */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0f12; /* डार्क बैकग्राउंड ताकि लाइट अच्छे से दिखे */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        /* टेक्स्ट कंटेनर */
        .text-container {
            position: relative;
            display: inline-block;
        }

        /* मुख्य बड़ा टेक्स्ट */
        .animated-text {
            font-size: 6rem; /* अक्षरों का बड़ा आकार */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.1); /* हल्का पारदर्शी बेस रंग */
            background-image: linear-gradient(
                to right,
                #4f46e5 0%,    /* पर्पल-ब्लू */
                #ff007f 25%,   /* नियॉन पिंक */
                #ffffff 50%,   /* चमकदार सफेद लाइट (रिफ्लेक्शन) */
                #ff007f 75%,   /* नियॉन पिंक */
                #4f46e5 100%   /* पर्पल-ब्लू */
            );
            background-size: 200% auto; /* रिफ्लेक्शन मूव करने के लिए साइज */
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* ग्लोइंग इफेक्ट (आसपास की चमक) */
            filter: drop-shadow(0 0 10px rgba(255, 0, 127, 0.3));
            
            /* CSS एनिमेशन: 3 सेकंड में लाइट शुरू से अंत तक जाएगी और बार-बार चलती रहेगी */
            animation: shineReflection 3s linear infinite;
        }

        /* लाइट रिफ्लेक्शन का एनिमेशन */
        @keyframes shineReflection {
            0% {
                background-position: 200% center;
            }
            100% {
                background-position: -200% center;
            }
        }
    </style>
</head>
<body>

    <div class="text-container">
        <h1 class="animated-text" id="logo-text">SS INFOTECH</h1>
    </div>

    <script>
        // यदि आप भविष्य में जावास्क्रिप्ट से इस एनिमेशन की स्पीड 
        // या टेक्स्ट को डायनेमिकली बदलना चाहें:
        document.addEventListener("DOMContentLoaded", () => {
            const textElement = document.getElementById("logo-text");
            
            // उदाहरण के लिए: कंसोल में मैसेज देखना कि स्क्रिप्ट लोड हो चुकी है
            console.log("SS INFOTECH एनिमेशन सफलतापूर्वक लोड हो गया है।");
            
            /* आप चाहें तो JS के जरिए यूजर के क्लिक पर स्पीड बदल सकते हैं:
               textElement.style.animationDuration = "1.5s"; // तेज रिफ्लेक्शन के लिए
            */
        });
    </script>

</body>
</html>
